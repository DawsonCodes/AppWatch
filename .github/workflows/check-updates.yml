name: Check app updates

on:
  schedule:
    # Target: exactly twice a day at 12:00 AM and 12:00 PM in America/Detroit.
    # GitHub Actions cron runs in UTC and has no timezone or DST support, so
    # candidate runs are scheduled for both possible UTC offsets:
    #   - Detroit on EDT (UTC-4): midnight = 04:00 UTC, noon = 16:00 UTC
    #   - Detroit on EST (UTC-5): midnight = 05:00 UTC, noon = 17:00 UTC
    # The "gate" job below lets a run proceed only when the current hour in
    # America/Detroit is actually 00 or 12, so exactly two of these four
    # candidates run each day, year-round, across DST changes.
    - cron: '0 4,5,16,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Never run two checkers at once (overlapping pushes would conflict).
concurrency:
  group: check-updates
  cancel-in-progress: false

jobs:
  # Decides whether this trigger corresponds to midnight/noon in Detroit.
  # Manual runs (workflow_dispatch) always pass. Note: GitHub delivers
  # scheduled runs best-effort — a delay past a full hour boundary would skip
  # that slot; the next slot still runs as normal.
  gate:
    if: github.repository == 'DawsonCodes/AppWatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Check the current hour in America/Detroit
        id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual trigger — running."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour="$(TZ=America/Detroit date +%H)"
          echo "Current hour in America/Detroit: $hour"
          if [ "$hour" = "00" ] || [ "$hour" = "12" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: this UTC slot is the other daylight-saving candidate." \
              >> "$GITHUB_STEP_SUMMARY"
          fi

  check:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check stores for updates
        id: check
        run: npm run check:updates

      - name: Validate generated data
        run: npm run validate:data

      - name: Commit updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "chore(data): update tracked app metadata"
          git push origin main

  # Pushes made with GITHUB_TOKEN do not fire the deploy workflow's `push`
  # trigger (GitHub's recursion protection), so deploy explicitly when the
  # data changed.
  deploy:
    needs: check
    if: needs.check.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
