name: Bug report
description: Something in AppWatch is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug in AppWatch.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem, including what you expected instead.
      placeholder: The detail view shows no version history for…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open https://dawsoncodes.github.io/AppWatch/
        2. Search for…
        3. …
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Website / dashboard
        - Update checker (GitHub Actions)
        - Data files (apps.json / history.json / status.json)
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / environment
      placeholder: e.g. Firefox 141 on Android 16
